name: CI

permissions:
  contents: write
  checks: write
  pull-requests: write

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
jobs:
  test:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Angular ou JAVA project
        id: detect
        run: |
          if [ -f "angular.json" ]; then
            echo "type=angular" >> $GITHUB_OUTPUT
          elif [ -f "build.gradle" ] || [ -f "*/build.gradle" ]; then
            echo "type=java" >> $GITHUB_OUTPUT
          else
            echo "No Angular ou Java project detected."
            exit 1
          fi
        ###Angular
      - name: Setup Node.js
        if: ${{ steps.detect.outputs.type == 'angular' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'

      - name: Install npm
        if: ${{ steps.detect.outputs.type == 'angular' }}
        run: npm install -g npm@10.2.4

      - name: Install dependencies
        if: ${{ steps.detect.outputs.type == 'angular' }}
        run: npm ci

      - name: Build
        if: ${{ steps.detect.outputs.type == 'angular' }}
        run: npm run build

      - name: test
        if: ${{ steps.detect.outputs.type == 'angular' }}
        run: npm test -- --code-coverage

      - name: coverage test
        if: ${{ steps.detect.outputs.type == 'angular' }}
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage/olympic-games-starter/

      ###Java
      - name: Setup Java
        if: ${{ steps.detect.outputs.type == 'java' }}
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: 'gradle'

      - name: Setup Gradle
        if: ${{ steps.detect.outputs.type == 'java' }}
        uses: gradle/actions/setup-gradle@v5

      - name: Install dependencies
        if: ${{ steps.detect.outputs.type == 'java' }}
        run: ./gradlew build

      - name: test
        if: ${{ steps.detect.outputs.type == 'java' }}
        run: ./gradlew clean test

      - name: Packaging
        if: ${{ steps.detect.outputs.type == 'java' }}
        run: ./gradlew bootWar

      - name: Publish test results
        if: ${{ steps.detect.outputs.type == 'java' }}
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Tests
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_SECRET }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.ref_name }}-${{ github.sha }}  

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


  release:
    name: Create Release Angular
    needs: [ test, build ]
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Semantic Release
        run: npm install semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github @semantic-release/npm @semantic-release/commit-analyzer @semantic-release/release-notes-generator

      - name: Release with Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Log in the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_SECRET }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image tag version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-${{ github.ref_name }}-${{ github.sha }}  

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}